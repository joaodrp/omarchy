#!/bin/bash
# chezmoi modify script: maintain a personal Hyprland autostart block
# idempotently. Strips any previously-applied block between markers, trims
# trailing blank lines, then re-appends the canonical block.
set -e

awk '
  /^# >>> dotfiles: .* >>>$/ { skip = 1; next }
  skip && /^# <<< dotfiles: .* <<<$/ { skip = 0; next }
  !skip
' | awk '
  { lines[NR] = $0; if (NF) last = NR }
  END { for (i = 1; i <= last; i++) print lines[i] }
'

cat <<EOF

# >>> dotfiles: wayvnc autostart >>>
# Remote desktop over VNC, served on the Tailscale IP (see wayvnc-tailnet).
exec-once = $HOME/.local/bin/wayvnc-tailnet
# <<< dotfiles: wayvnc autostart <<<
EOF
