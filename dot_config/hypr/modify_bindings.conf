#!/bin/bash
# chezmoi modify script: maintain personal Hyprland bindings idempotently.
# Strips any previously-applied block between markers, trims trailing blank
# lines, then re-appends the canonical block — so editing this file
# propagates on the next `chezmoi apply`.
set -e

# Match the marker prefix (not an exact title) so renaming the block still
# strips the previously-applied copy instead of leaving a duplicate behind.
awk '
  /^# >>> dotfiles: .* >>>$/ { skip = 1; next }
  skip && /^# <<< dotfiles: .* <<<$/ { skip = 0; next }
  !skip
' | awk '
  { lines[NR] = $0; if (NF) last = NR }
  END { for (i = 1; i <= last; i++) print lines[i] }
'

cat <<'EOF'

# >>> dotfiles: personal bindings >>>
# Brightness keys. This keyboard emits no XF86MonBrightness codes; the top-row
# brightness keys depend on the NuPhy Win/Mac switch:
#   Windows mode (or Fn-held in Mac mode) -> F1 / F2 (keysyms)
#   Mac mode (plain press)                -> KEY_F14 / KEY_F15
# Mac mode is bound by keycode (code:192 = KEY_F14+8, code:193 = KEY_F15+8)
# because the active layout doesn't map those keys to F14/F15 keysyms. Bind
# both so brightness works in either mode. Dispatches via
# omarchy-brightness-display, which handles Apple Studio Displays (asdcontrol)
# and laptop backlights (brightnessctl) transparently.
bindel = , F1,            exec, omarchy-brightness-display 5%-
bindel = , F2,            exec, omarchy-brightness-display +5%
bindel = SHIFT, F1,       exec, omarchy-brightness-display 1%
bindel = SHIFT, F2,       exec, omarchy-brightness-display 100%
bindel = ALT, F1,         exec, omarchy-brightness-display 2%-
bindel = ALT, F2,         exec, omarchy-brightness-display +2%
bindel = , code:192,      exec, omarchy-brightness-display 5%-
bindel = , code:193,      exec, omarchy-brightness-display +5%
bindel = SHIFT, code:192, exec, omarchy-brightness-display 1%
bindel = SHIFT, code:193, exec, omarchy-brightness-display 100%
bindel = ALT, code:192,   exec, omarchy-brightness-display 2%-
bindel = ALT, code:193,   exec, omarchy-brightness-display +2%

# Disable upstream webapp launchers I don't use. The `bindd` lines that bind
# these keys live earlier in this file; `unbind` cancels them. Listed here
# (not deleted upstream) so the override survives omarchy refreshes.
unbind = SUPER SHIFT, E         # Hey email
unbind = SUPER SHIFT, C         # Hey calendar
unbind = SUPER SHIFT, P         # Google Photos
unbind = SUPER SHIFT CTRL, G    # Google Messages
# <<< dotfiles: personal bindings <<<
EOF
