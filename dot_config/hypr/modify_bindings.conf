#!/bin/bash
# chezmoi modify script: idempotently append personal Hyprland bindings to
# Omarchy's ~/.config/hypr/bindings.conf without clobbering its contents.
# Receives the current file on stdin; outputs the desired contents.
set -e

content=$(cat)
printf '%s' "$content"

if ! printf '%s' "$content" | grep -q '# >>> dotfiles: brightness >>>'; then
    cat <<'EOF'

# >>> dotfiles: brightness >>>
# Apple Studio Display brightness via asdcontrol.
# Overrides upstream media.conf (which uses brightnessctl — backlight-only).
unbind = , XF86MonBrightnessUp
unbind = , XF86MonBrightnessDown
unbind = SHIFT, XF86MonBrightnessUp
unbind = SHIFT, XF86MonBrightnessDown
unbind = ALT, XF86MonBrightnessUp
unbind = ALT, XF86MonBrightnessDown
bindel = , XF86MonBrightnessUp,         exec, asd-brightness +10%
bindel = , XF86MonBrightnessDown,       exec, asd-brightness -10%
bindel = SHIFT, XF86MonBrightnessUp,    exec, asd-brightness 100%
bindel = SHIFT, XF86MonBrightnessDown,  exec, asd-brightness 1%
bindel = ALT, XF86MonBrightnessUp,      exec, asd-brightness +2%
bindel = ALT, XF86MonBrightnessDown,    exec, asd-brightness -2%
# <<< dotfiles: brightness <<<
EOF
fi
